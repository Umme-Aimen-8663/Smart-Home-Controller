name: smart_home_controller
description: "Smart Home Controller using Flutter + MQTT"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mqtt_client: ^10.4.0
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2
  lottie: ^3.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true